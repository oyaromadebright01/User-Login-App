<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="login">
    <h1>Sign Up</h1>
    <p>{{ msg }}</p>
    <form method="POST" action="/register">
        <input type="text" name="username" id="username" placeholder="Choose a username" required><br><br>
        <input type="password" name="password" id="password" placeholder="Choose a password" required><br><br>
        <button type="submit">Register</button>
        <p>Already have an account? <a href="/">Login here</a></p>
    </form>
</body>
</html>
